name: build-and-lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest  # Fixed spelling

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5  # Updated

      - name: Setup Node
        uses: actions/setup-node@v4  # Updated
        with:
          node-version: 22
          cache: 'npm'  # Added for speed

      - name: Install backend dependencies
        run: npm ci  # Fixed: use ci for CI

      - name: Lint backend
        run: npm run lint -- --max-warnings=0

      - name: Install frontend dependencies
        working-directory: client/react-frontend
        run: npm ci

      - name: Install ESLint deps  # Add this
        working-directory: client/react-frontend  
        run: npm install --save-dev @eslint/js eslint

      - name: Lint frontend
        working-directory: client/react-frontend
        run: npm run lint -- --max-warnings=0

      - name: Build backend image
        run: docker build -t backend .

      - name: Build frontend image
        run: docker build -t frontend ./client/react-frontend  # Fixed tag